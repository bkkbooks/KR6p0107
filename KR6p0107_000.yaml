body:
  text: 淨土必求自敘大本彌陀經云佛告彌勒其有得聞彼佛名號歡喜踊躍乃至一念當知是人為得大利則是具足無上功德是故彌勒設有大火充滿三千大千世界要當過此聞是經法歡喜信樂受持讀誦如説修行所以者何多有菩薩欲聞此經而不能得若有衆生聞此經者於無上道終不退轉是故應當專心信受持誦説行余為此起信樂心不顧譏謗復集是書以公有緣倘有一毫之善願佛哀憐令我臨命終時決定往生一得往生願承此善速入娑婆以此經法廣化有情盡未來際永不疲倦因今生所受淨土之恩難酬難報故也淨土必求者淨土即功德莊嚴甚深微妙之境也必求即至誠懇切廣大圓融之心也夫淨土妙門乃諸佛共讚難聞難知故經云多有菩薩欲聞此經而不能得我幸有緣已得聞知那可不發決定之心速修而證也如人已登寶山那可自甘受苦不欲取寶而回也是故應當必定求之每日持名限定幾萬每日禮像限定幾時乃至畢命為期朝朝向西十念日日對像哀陳皆必求之志也若不如是恰恰如登寶山自甘空手依舊長劫輪回豈不痛哉為此特採至切要之文述成最警䇿之語而為一生取辦之要書也諸佛甚深微妙淨土之境皆從衆生廣大圓融必求之心而得故名之曰淨土必求是我同倫切須多讀方得發起必求之心而早歸淨土也矣余因有戒述之誓故然臂香四十八炷供養阿彌陀佛至心懺悔發願云我今然臂香供養彌陀佛願我衆罪愆決定皆消滅願我命終時決定生彼國願早聞佛乘願早度一切願以此功德莊嚴佛淨土上報四重恩下濟三途苦若有見聞者悉發菩提心盡此一報身同生極樂國時在光緒三年佛誕日戀西比丘玉峰古崑稽首書於法源庵之報恩關淨土必求目録念佛法門功重老實感堅祖語奉行十念讀要解得持名要訣讀要解幸死盡偷心因動嗔心立行懺悔讀四大祖師語有感稱名述懷四則并序讀佛偈四則并問答舌病難除戒午後食愧多貪恚願遲作師自恥好談慎説人過然臂香供梵網經懺悔滿七自慶述懷告衆六時經行出聲念佛念佛堂所用讚六則
