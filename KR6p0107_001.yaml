body:
  text: 淨業學者心永空靜同較念佛法門功重老實崑深感淨土法門之恩者實從蓮池大師臨終老實念佛一句而入也蓮池大師一生不惜身命闡揚淨土至臨終時見大衆悲哀苦求開示不得已盡力畢命答一句老實念佛大矣哉不可思議也我想此語非但包括蓮祖一生不惜身命廣度衆生之説真可以包括釋迦如來四十九年剖出心肝普收萬類之談何哉老實者至誠也念者衆生本有靈覺之心也佛者十法界最勝之果也以此靈覺之心稱彼最勝之佛則無明黑暗之情九界垢穢之境當下明淨矣濁流寸寸清珠映暗室層層寶炬照此之謂也圓淨四土圓見三身良在於斯故要解云一聲阿彌陀佛即釋迦本師於五濁惡世所得之阿耨多羅三藐三菩提法今以此果覺全體授與濁惡衆生乃諸佛所行境界唯佛與佛能究盡非九界自力所能信解也是故念佛功德非三乘聖行之能比也亦非人天福德之能同也故徹悟云倘置佛名而別修三乘聖行亦是浪用精神亦是千鈞之弩為鼷鼠而發機況造六凡生死之業乎奉告現前信願持名之友當生慶幸倘非深投佛種久受佛恩於此法門安能信之安能願之安能死盡偷心而力行之死盡偷心者即是信極一門不被諸惑也亦即老老實實之謂也亦即至至誠誠之謂也當知此心能頓超苦海能頓入樂能頓見彌陀乃至能廣度衆生滿菩提願故觀經云欲生上品上生者第一當發至誠心故知三藏十二部悉不外乎一句老實念佛者矣崑為此信極蓮池大師真是彌陀化身特來傳此念佛三昧之祕訣也為勉新學復作偈云老實之心妙莫比以斯念佛佛愈喜可憐一類聰明人越學希奇越背理老實之心把佛持佛光遍照必常知故能令彼愚夫婦速脫塵牢入寶池老實之心念佛名能使淨業速圓成故吾蓮祖臨終日極口勸人依此行老實之心勤念佛平平直直無奇特彌陀因此更哀憐必定早垂金臂接感堅祖語奉行十念崑初參學時見出家人修十念法每輕之曰此是阿彌陀佛攝受俗人之事因其終日忙忙不能多念故發此誓若能依行亦可往生出家之人從朝至暮功課許多何必重此十念只要一時功課亦能抵幾回十念此因不知淨土之宗旨故也在俗之人終日忙忙但修十念佛必攝受往生況出家之人終日或誦經多少或念佛多少再能依阿彌陀佛大慈悲願奉行十念阿彌陀佛豈不決定令其往生上品者哉諸大祖師奉行十念蓋為此也崑那時真是愚癡之極輕毀阿彌陀佛如此大慈悲大願力三根普收之大根本法輪若無此法安能頓收十惡五逆皆生淨土是故輕此法門即是輕阿彌陀佛大慈悲願輕阿彌陀佛大慈悲願即是輕自己常住不滅之大圓覺心耳楚石禪師晨朝十念終身不缺幽溪法師奉為日課至老不休此二聖祖皆法門龍象道德充足遠近皆知尚且如是竭力奉行故堅密大師云此淨業必不可少之行即課佛多者亦當行之崑從此深思忽然有省始知十念法門至要至切故慈雲懺主云十念是淨因要切必不可廢聰明人每每不肯行者不知彌陀有此大願故也或信不深願不切故也果能行之必信願堅固所以定得往生故要解云深信發願即無上菩提合此信願的為淨土指南由此而執持名號乃為正行若信願堅固臨終十念一念亦決往生臨終十念尚能往生況畢世奉行豈不決定往生故我於癸亥年二月十九日在佛頂山禪堂立誓為始遂勸諸友而共行之丁丑年春日識於法源庵之報恩關因述偈云十念頓圓清淨業彌陀因地悲心切觀吾受苦不能休特駕此航來迎接十念頓圓清淨業慈雲常代彌陀説勸人每早向西持盡報定生極樂國十念頓圓清淨業楚公宗匠亦欣悅畢生常念志無休親見佛身遍界塞十念頓圓清淨業幽溪聖祖方明徹德招天樂每臨空此法修行終不缺附慈雲懺主十念法門每晨服飾已面西正立合掌連聲稱阿彌陀佛盡一氣為一念如是十氣為十念隨氣長短不限佛數氣極為度聲不高低不緩急調停得中十氣連屬令心不散專精為功名十念者是藉氣束心也作此念已發願回向云我弟子某甲一心歸命極樂世界阿彌陀佛願以淨光照我慈誓攝我我今正念稱如來名經十念頃為菩提道求生淨土佛昔本誓若有衆生欲生我國至心信樂乃至十念若不生者不取正覺唯除五逆誹謗正法我今自憶此生已來不造逆罪不謗大乘願此十念得入如來大誓海中乘佛慈力衆罪消滅淨因增長若臨欲命終自知時至身不病苦心無貪戀心不倒散如入禪定佛及聖衆手執金臺來迎接我如一念頃生極樂國華開見佛即聞佛乘頓開佛慧廣度衆生滿菩提願作已便止不必拜要盡此生不得一日暫廢唯將不廢自要其心得生淨土讀要解得持名要訣崑每讀彌陀要解至光壽之文感激之至何幸而得領此妙宗定是阿彌陀佛光壽二德之所加被及一切諸佛大慈悲心之所護念十方世尊阿彌陀佛無數劫來為度我故修菩薩道不惜身命原為此也欲此妙宗以熏有緣而述偈云但將名號掐珠念壽量光明全顯現欲契西來向上宗只須老實休分辨但念名號光壽顯現者即要解云阿彌陀正翻無量本不可説本師以光壽二義收盡一切無量光則橫遍十方壽則竪窮三際橫竪交徹即法界體舉此體作彌陀身土亦即舉此體作彌陀名號是故彌陀名號即衆生本覺理性持名即始覺合本始本不二生佛不二故一念相應一念佛念念相應念念佛也復次由無量光義故衆生生極樂即生十方見阿彌陀佛即見十方諸佛能自度即普利一切由無量壽義故極樂人民即是一生補處皆定此生成佛不至異生當知離却現前一念無量光壽之心何處有阿彌陀佛名號而離却阿彌陀佛名號何由徹證現前一念無量光壽之心如是則向上之宗全在裏許只須老實念佛不用分辨矣故圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實彼諸衆生聞是法門信解受持不生驚畏是則名為隨順覺性如是衆生已曾供養百千萬億恆河沙諸佛及大菩薩植衆德本佛説是人名為成就一切種智故徹悟禪師大悟圓覺剖心瀝血讚一聲佛號云倘置佛名而別修三乘聖行亦是浪用精神亦是千鈞之弩為鼷鼠而發機堅密大師乃靈峯嫡子深得要解以名召得罄無不盡不勞觀想不必參究之旨故云一句彌陀非大徹不能全提而最愚亦無少欠倘有些子分別便成大法魔殃只貴一心受持寧羡依稀解悟又云劫濁盛時衆生魘重毋以持名雜參話毋以粗心習勝觀雜參話則濁智騰波定起邪見習勝觀則非其境界定起魔事唯以現前一念無明業識之心令其專稱阿彌陀佛名號無間一心未有不親證親到者法門至此愈卑而愈不勝仰愈淺而愈不可俯自呼自應自魘自醒一心之本元頓彰法界之體用全揭無庸鑽仰秪麼修行倘未悟透根源寧可顓蒙合妙夫顓蒙念佛至矣極矣無復加矣此皆老實念佛不用分辨之謂也如是妙行不可思議六方共讚猶不能盡願諸同學深思深思余慚愧宿障深重不能現世宏揚如是廣大法門以報諸佛諸祖之深恩唯有死心極力畢命為期六萬彌陀六時禮想誓無間日而已識於山陰法源庵之報恩關讀要解幸死盡偷心崑深慚垢重雖有好學之心實無久專之志是故學經學律學禪學淨皆不成就幸讀彌陀要解至解五濁之文而得死盡偷心專持名號欲共有緣同死偷心故將所幸而述偈云持名容易死心難幸把彌陀要解看欲想一生離五濁非憑此行必徒然非憑此行必徒然者即要解云吾人處劫濁中決定為時所囿為苦所逼非帶業橫出之行必不能度處見濁中決定為邪智所纏非不假方便之行必不能度處煩惱濁中決定為貪欲所陷為惡業所螫非即凡心是佛心之行必不能度處衆生濁中決定安於臭穢而不能洞覺甘於劣弱而不能奮飛非欣厭之行必不能度處命濁中決定為無常所吞石火電光措手不及非不費時劫不勞勤苦之行必不能度復次秪此信願莊嚴一聲阿彌陀佛轉劫濁為清淨海會轉見濁為無量光轉煩惱濁為常寂光轉衆生濁為蓮華化生轉命濁為無量壽故一聲阿彌陀佛即釋迦本師於五濁惡世所得之阿耨多羅三藐三菩提法今以此果覺全體授與濁惡衆生乃諸佛所行境界唯佛與佛能究盡非九界自力所能信解也若不深知其甚難將謂更有別法可出五濁熢㶿宅裏戲論紛然唯深知其甚難方肯死盡偷心寶此一行此本師所以極口説其難甚而深囑我等當知也因動嗔心立行懺悔妙叶禪師云念佛三昧體性雖圓宜盡微細條章革諸猥弊乃至小罪猶懷大懼況我實有嗔恚諸友令其動恨之大過若不生大怖畏至心懺悔非但不能往生復恐後世受大惡報無量壽經云今世恨意微相憎嫉後世轉劇至成大怨可不懼乎故於光緒二年中元日敬然臂香九炷以求懺悔而述偈云自慚垢重每生嗔惱亂諸賢恨且深為此臂然香九炷懺除前罪學慈心從此立誓畢命為期每月朔望必然臂香三炷至心懺悔發願云我今然臂香供養彌陀佛願我衆罪愆決定皆消滅願我命終時決定生彼國願早聞佛乘願早度一切願以此功德莊嚴佛淨土上報四重恩下濟三途苦若有見聞者悉發菩提心盡此一報身同生極樂國每日六時禮想中加讀慈雲懺主大懺悔文一遍以䇿嗔恚學友及毀罵道人之心不敢復起我久喜此文因其懺儀太長故未遵行今蒙妙能淨友直言相告而知嗔過乃方讀此合論云真機非友不發惡法非友不止誠哉此言也我本違父出家逆師行腳今又每每嗔恚學友及遠來挂搭請示之人乃至內覆過失外現威儀造種種罪將來必墮三途越想越慚越思越愧怖畏之心越起越大幸每讀此文從怖畏而生法喜其中妙益不可思議越讀越警越讀越切自鞭之語無過於斯欲共有緣互相警䇿故述數言以志緣起云耳戀西學人古崑稽首書於法源庵之報恩關附大懺悔文出淨土十要我弟子某甲至心懺悔十方諸佛真實見知我及衆生本性清淨諸佛住處名常寂光遍在剎那及一切法而我不了妄計我人於平等法中而起分別於清淨心中而生染著以是顛倒五欲因緣生死循環經歷三界坐此相續不念出期而復於中造極惡業四重五逆及一闡提非毀大乘謗破三寶謗無諸佛斷學般若用十方僧物用佛塔物汙梵行人習近惡法於破戒者更相讚護三乘道人種種毀罵內覆過失外現威儀常以五邪招納四事不淨説法非律教人因佛出家反破佛法違逆師長如法教誨恣行貪恚無慚恥心以是因緣諸惡業力命終當墮阿鼻地獄猛火熾然受無量苦千萬億劫無解脫期今始覺知生大慚愧生大怖畏十方世尊阿彌陀佛久已於我生大悲心無數劫來為度我故修菩薩道不惜身命今已得佛大悲滿足真實能為一切救護今我造惡必墮三途願起哀憐受我懺悔重罪得滅諸惡消除乃至娑婆生因永盡諸佛淨土如願往生當命終時悉無障礙接發願云我懺悔已六根三業淨無瑕纍所修善根悉亦清淨皆悉回向莊嚴淨土普與衆生同生安養願阿彌陀佛常來護持令我善根現前增進不失淨因臨命終時身心正念視聽分明面奉彌陀與諸聖衆手執華臺接引於我一剎那頃生極樂國華開見佛即聞佛乘頓開佛慧廣度衆生滿菩提願加於彌陀經禮想儀極樂世界大慈大悲阿彌陀佛下先讀此文然後念佛讀四大祖師語有感崑業障深重何緣得熏持名妙法實仗四大祖師之言教而得開發者多愧無學問不能闡揚以報祖恩遂將書名奉告諸友以表不忘其本耳幽溪大師之彌陀圓中鈔蕅益大師之彌陀要解堅密大師之十要總序徹悟禪師之語録略揭大綱而述偈云六字洪名妙莫窮即空即假即圓中法華止觀皆明此是故幽溪立鈔宗六字洪名妙莫窮華嚴全部在其中竪窮橫遍難思議蕅祖因斯立要宗六字洪名妙莫窮三身之德悉居中徹公悟此垂言教切切闡揚念佛宗六字洪名妙莫窮堅師捨命於斯中願三大要廣流世令衆得聞希有宗崑每讀三大要如膏肓之重病得救濟之神丹感德豈可思議也哉因述此偈聊表其本并採全文為證以便持名學者同沾妙益淨土十要總序云淨土持名之法有三大要焉一者六字洪名念念之間欣厭具足如出幽獄奔託王家步步之間欣厭具足是故萬緣之唾不食衆苦之忍莫回高置身於蓮華便訂盟於芬利蛆蠅糞壤可煞驚慚二者參禪必不可無淨土為防退墮寧不寒心淨土必不可入禪機意見稍乘二門俱破若夫餘宗在昔之時不必改弦但加善巧回向在今之世秪可助行必須淨業專修冷暖自知何容強諍三者一句彌陀非大徹不能全提而最愚亦無少欠倘有些子分別便成大法魔殃只貴一心受持寧羡依稀解悟乞兒若見小利急須吐棄無餘棒打石人頭嚗嚗論實事已上三要頗切今時倘能真實指迷我願捨身供養十方三世共聞此言稱名述懷四則并序圓中鈔云凡諸佛應身接物有乎四益一以形益現身是也二以光益放光是也三以聲益説法是也四以通益現神通是也唯阿彌陀佛四益之外更加之以名接物以其有本時所發誓願故也餘之四接其攝機也狹唯以名接物其攝機也廣既彌陀發願以名而接物是故應當專修持名之行以投願海方得感應易顯淨業速成耳又云一稱嘉號萬德齊彰者名實不異之謂也名即假名實即實德假名之外別無實德實德之外別無假名故徹悟云全德立名德外無名以名召德名外無德所以幽溪靈峯堅密諸祖皆勸持名必不可雜觀想以違彌陀以名接物之大誓願也又靈峯大師云念佛人若更問念佛是誰頭上安頭騎驢覓驢明眼人為之噴飯而近代無知狂悖之徒反以話頭為奇特名號為尋常棄如意珠王競取瓦礫可哀矣崑為此直告云能念佛的即是不生不滅之大圓覺心也念善定生天宮念惡定墮地獄念佛定生佛國倘若更問是誰正是靈峯所呵者分明誰字話頭是鈍根人事有何奇哉又經云極惡之人必墮地獄暫稱佛號即變獄火而成蓮華豈有圓頓微妙更過於此如上四段皆至要至切之談持名行者可不盡心竭力者乎為暢鄙懷復遵前義而述偈云極樂巍巍萬德尊以名接物誓宏深我今信佛無虗願決定持名求往生但稱名號德明明彼佛宛然在口唇可愧我心多異念於中未見紫金身稱佛一聲掐一珠本來面目分明舉廣長舌相證明斯切忌更參向上理獄火炎炎稱佛名頓然一朵寶蓮成速超苦海無如此那可於中不死心讀佛偈四則并問答余題讀佛軒有學者問云佛貴心念諸説皆然師重口讀請示其由令我斷疑亦好共行余反問曰萬法唯心汝已知否答曰已知又問口是一法否答曰口是一法余曰既知口是一法諒必已知口即是心若不知口即是心萬法唯心之義便不通矣自口唯心尚且不知他物唯心豈非空説汝今既知口是一法即是自心萬法唯心之義可謂的確矣如此終日口讀佛豈非終日心念佛何疑之有復次當知在朝貴士處世明賢無有一人不從讀誦而得也何況出世間之大道豈有不從讀誦而成哉遂作四偈而安慰之佛號勤勤讀蓮華速速開彌陀曾有願決定為君來佛既有緣讚須加信願持朝朝只十氣亦決到蓮池人人佛肯讀箇箇菩提熟乃至極凶人亦能生彼國下愚將佛讀賢者看為低且待臨終日各人見是非舌病難除戒午後食崑自癸酉春忽得舌病已經數載不能斷除豈不哀哉無奈舌病越久貪味之心越熾乃至時時刻刻歡喜喫東喫西如此之心豈非大亂心內之亂猶可稱佛猶可往生向外好喫之亂醜甚醜甚豈能現世而得往生者哉念佛鏡一書將一切法門與念佛比較皆差百千萬倍唯午齋一戒而極讚之因此害少人知覺故也經云貪財色名食睡五欲者必墮惡道可不懼乎因此立誓畢命為期常持午齋若破此戒必墮地獄不破此戒願佛哀憐必生西方因色身不佳夜飢難忍故於子時之後稍用小食而述偈云久纏舌病莫能去定是多生貪口味為此終身持午齋子時稍犯當慚愧愧多貪恚願遲作師欲為人師必須戒律精嚴慧解具足方能自利利他道業圓成者也愧哉我古崑非但不能如是抑且多貪多嗔難調難伏是故見恭敬我者便生貪愛見毀謗我者便生嗔恚此是古崑真實之言若是妄語必墮地獄如此心行豈能往生故圓覺經云有愛我者我與隨順非隨順者便生憎怨為憎愛心養無明故相續求道皆不成就豈不怕哉故立一願願早往生遲作人師以䇿愛順之心令著力念佛也我立一願必堅持慚愧難平貪恚癡且待往生安樂國方來此處作人師自恥好談慎説人過大寶積經云菩薩成就八法於諸佛前蓮華化生一乃至失命不説他過二化人令皈依三寶三安置一切於菩提心四梵行不染五造佛像安華座上六能除衆生憂惱七於貢高人常自謙下八不惱他人崑每讀此言真實慚愧菩薩乃至失命不説他過我從朝至暮總是説人之短論因果豈不定墮三途故梵網合注云惡口之罪亦令衆生墮三惡道可不慎乎因述偈云好談人過罪彌大必墮三途無出期是故菩薩至失命終不開口説他非然臂香供梵網經懺悔梵網經者崑從初受戒便喜持誦後於咸豐六年在杭城太平門外月塘寺相近之福善庵偷得靈峯大師梵網合注宛如舊失喜如獲寶所以歷逃兵難終不棄捨此書乃康熙間台宗金松弘法師之遺物也愈閲愈喜遂熟讀菩薩戒欲為常課慚愧宿垢深重力不由志於菩薩行不能遵修是故發心於報恩關中敬然臂香十炷供養梵網經十重戒又然臂香四十八炷供養四十八輕戒以求懺悔并懺偷取梵網合注諸書及一夜動嗔故燒蚊蟲乃至作無益事多傷蟲蟻等罪願命終時不墮惡道正念分明往生極樂而述偈云敬然臂香供戒經懺除破戒諸惡業願求臨死不沉淪正念分明生樂國滿七自慶述懷告衆無量壽經云其有得聞彼佛名號歡喜踊躍乃至一念當知此人為得大利則是具足無上功德崑恆於此言喜徹骨髓愧持念之功未竭其力由是發心於光緒丙子秋月在法源庵之報恩關啓建七七道場慚愧數經七期皆被障緣擾亂雖功不虗棄實不稱懷故今特請妙能法師為衆講經共相護七以安內外崑禁止語言以絶外事定拾萬彌陀六時禮想為日課以䇿懈倦於起七日敬然臂香三十八炷供養六方三十八佛名號又然臂香二十一炷供養釋迦彌陀觀音勢至及衆菩薩以求加護令我內外諸障不起每晨敬然臂香三炷發願云我今然臂香供養彌陀佛願我衆罪愆決定皆消滅願我命終時決定生彼國願早聞佛乘願早度一切滿七日敬然臂香四十八炷供養佛説阿彌陀經又然臂香十二炷供養阿彌陀佛觀音勢至諸菩薩衆以申回向願我承此道場功德臨命終時決定得生極樂世界早見彌陀早度衆生又然臂香三炷告衆云古崑深愧障重妄想難除七七已完並無祥瑞只於第三七完養息得一異夢至險至善堪為警䇿可以對衆説説夢一人以一把凶刀橫駕我頂手不能抵心中怖急知必定死忽憶彌陀必能救護即用畢命之力勇稱佛號幾聲遂醒得一身大汗歡喜異常不能為喻深思之必佛力使然真真實實是持名之大切要堅密大師六字洪名念念之間欣厭具足之旨不外乎此欲終身為警䇿而述偈云凶刀駕頂命必難顧勇心稱佛佛心救護欲想臨終決定離苦念念之間應當如此崑於持名之行最喜堅密大師六字洪名念念欣厭之言依憑數載猶未得旨今獲此夢心安意悅感恩難思矣敬然臂香四十八炷供養阿彌陀佛願我臨終念佛與此夢無異七越打靈峯大師之恩越顯祕藏指南云深信切願念佛而念佛時心多散亂者即是下品下生此語真是阿伽陀藥萬病總持令我垢重心亂無救之人得知念佛不用怕妄想只要信深願切必定往生末法億億人修行罕一得道唯依念佛皆可度脫此之謂也我從此不管妄想多少只顧持名每日幾萬願早生下品免受輪回想我垢重心亂病無可救幸得遇此活命靈丹粉骨碎身豈能報其深恩也哉故於今日敬然臂香四十八炷供養靈峯蕅益大師而發願云我今然臂香供養靈峯祖願我速往生早來擊法鼓普化垢亂人同生安樂所唯願大慈悲證明攝受我四七完承妙能法師入字讚云諒此回七期必定仗佛冥加得成三昧今不瞞醜而對之曰古人念佛往生甚多先得三昧而後往生能有幾位實為信深願切臨終仗佛力冥加暫得一心不亂而往生者多故普賢菩薩行願品云願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎若先得三昧何用願臨欲命終無諸障礙靈峯云得生與否全由信願之有無品位高下全由持名之深淺此亦不説先得一心不亂成就三昧方能往生唯先得一心成三昧者可往上品上生耳當知今時之人垢心日熾先得一心不亂成就三昧豈易言哉我但求一不改變之志亦千難矣萬難矣此番七期障緣不起持名心安且得日聽法音助起精進信也信極願也願極行也盡力深愧妄想究竟難息幸有彌陀慈誓收信願真深終得入諸友齊心護七之功無窮無盡法師講經助道之功亦無窮無盡崑七七日中蒙照獲益所受之恩亦無窮無盡矣願我等今世決定同生西方同見彌陀盡未來際同化衆生七內發願學六時經行出聲念佛第五七完慚愧空過忽憶幸讀佛經方知無始劫來受畜生身無量無數餓鬼地獄亦復如是想做騾時背負千斤腹無飽食晝夜驅馳苦不可言做牛時肩拖一犁背受千打步步之間痛無處欣暫時無力便送殺者豈不大苦今日幸仗佛力而得為僧種種受用只要自在經行出聲念佛何苦之有且得諸佛歡喜龍天護佑現在安隱臨終往生如此功德豈能議哉那可在念佛關中貪坐養神不欲開口今世若不往生則虗消信施披毛戴角依舊難逃故省庵法師云這回若不歸西去依舊從前受苦辛可不驚乎是故對佛發願云我弟子古崑敬然臂香九炷供養阿彌陀佛唯願大慈大悲常加被我令我出聲念佛胸頭不痛因每每出聲念佛胸頭微痛倘有宿障必垂救護方可䇿勵懈心圓成勝德早見彌陀廣度衆生也矣念佛堂所用讚六則彌陀要典普度慈航一歷耳根道不忘六剎盡宣揚護念猶長的的是經王接蓮池會經宣極樂清淨莊嚴佛壽無邊光亦然生者悉高賢鳥樹談玄勝妙異羣詮接蓮池會彌陀名號萬德圓彰信願執持功莫量諸佛共稱揚登此舟航不動到西方接身金色執持名號脫苦奇方法藏因中願力強果上放毫光攝受迷狂同往九蓮鄉接身金色火宅主大恩王殷勤説彼清涼有佛常放無量光妙法正宣揚滿空天樂日鏗鏘金樓玉宇無量若人持名信願強決定往他鄉六方佛出廣長同聲稱讚西方護念信者得安康同歸極樂場如斯恩德豈敢忘應當發願堅強終日持名急忙忙必早見慈王淨宗十集附余慚愧障深學淺文字不通雖強持名功又不熟更加有病焉能酬對故將鄙見淨宗十集之名開列於後以便問者自可尋閲言淺理明實行為要欲現世往生必不可輕忽當知我報佛恩亦在此壞名聲亦在此故自嘆云為淨宗恨無力集十書苦已極費了多少心乾了多少血招了多少譏受了多少折儻能結著一人緣喫盡千酸心也悅慈雲大師云勸得一人生淨土縱自不修行亦合得生佛國何故如斯強出頭總因淨友多疑説信我者當愍之丁丑夏告病比丘玉峯戀西稽首謹識第一經律異相先明因果方肯念佛第二蓮宗必讀第三西方徑路第四淨土自警第五淨土神珠第六西歸行儀第七念佛開心第八淨土隨學第九上品資糧第十淨土必求附淨業痛䇿之後極力奉答儻有請示不能回者唯答云每日必定要修十念法每日必定要持彌陀經每日必定要念多少佛在家人從一千起出家人從一萬起乃至多千多萬各盡其力總要畢命為期有此功德仗佛十念救度之願臨命終時必定往生十念尚生況復百念千念萬念畢命為期念豈不必定往生此是古崑自行之事極力之説願有緣者思而勉之發露懺悔古崑深愧學地不真亂心難伏正好著力念佛偏要集東集西每每痛戒每每隨犯豈不深可哀哉故此復然臂香四十八炷供養阿彌陀佛至心發露以求懺悔願莫再犯自障往生時在丁丑六月二十二日讀佛軒對附六字洪名常讀誦一尊佛像誓歸依報恩關對附六時禮像除心垢一志持名報佛恩
